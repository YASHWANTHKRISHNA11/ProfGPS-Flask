<!-- attendance-success.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance Success - ProfGPS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="container">
      <div class="logo-container">
        <img src="{{ url_for('static', filename='LOGO.png') }}" alt="ProfGPS Logo" />
        <h1>ProfGPS</h1>
      </div>
    </div>
  </header>

  <main class="success-message">
    <h2 style="color: #10B981;">✅ Attendance Marked Successfully</h2>
    <p>Faculty ID: <strong>{{ faculty_id }}</strong></p>
    <p>Time: <strong>{{ timestamp }}</strong></p>
    <a href="{{ url_for('index') }}" class="btn">Back to Home</a>
  </main>

  <footer>
    <div class="watermark-container">
      <img src="{{ url_for('static', filename='LOGO.png') }}" alt="ProfGPS Logo" />
    </div>
    <p>&copy; 2025 ProfGPS. All rights reserved.</p>
  </footer>
</body>
</html>
