<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Faculty - Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h2>Faculty Management</h2>
  <table border="1">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Designation</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for faculty in faculty_list %}
      <tr>
        <td>{{ faculty.name }}</td>
        <td>{{ faculty.email }}</td>
        <td>{{ faculty.department }}</td>
        <td>{{ faculty.designation }}</td>
        <td>
          <a href="{{ url_for('add_faculty') }}">+ Add New Faculty</a>
          <a href="{{ url_for('edit_faculty', faculty_id=faculty.id) }}">Edit</a> |
          <a href="{{ url_for('delete_faculty', faculty_id=faculty.id) }}" onclick="return confirm('Are you sure you want to delete this faculty?');">Delete</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
