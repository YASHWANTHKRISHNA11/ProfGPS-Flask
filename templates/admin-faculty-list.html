<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Faculty - Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="container">
      <div class="logo-container">
        <img src="{{ url_for('static', filename='LOGO.png') }}" alt="ProfGPS Logo" />
        <h1>Faculty Management</h1>
      </div>
      <nav>
        <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
        <a href="{{ url_for('gps_boundary') }}">GPS Settings</a>
        <a href="{{ url_for('logout') }}">Logout</a>
      </nav>
    </div>
  </header>

  <!-- Content -->
  <main class="form-container">
    <div style="text-align: right; margin-bottom: 1rem;">
      <a href="{{ url_for('add_faculty') }}" class="btn btn-primary">+ Add New Faculty</a>
    </div>

    <div class="table-container">
      <table class="dashboard-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Designation</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for faculty in faculty_list %}
          <tr>
            <td>{{ faculty.name }}</td>
            <td>{{ faculty.email }}</td>
            <td>{{ faculty.department }}</td>
            <td>{{ faculty.designation }}</td>
            <td>
              <a href="{{ url_for('edit_faculty', faculty_id=faculty.id) }}" class="btn btn-secondary">Edit</a>
              <a href="{{ url_for('delete_faculty', faculty_id=faculty.id) }}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this faculty?');">Delete</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="watermark-container">
      <img src="{{ url_for('static', filename='LOGO.png') }}" alt="ProfGPS Logo" />
    </div>
    <p>&copy; 2025 ProfGPS. All rights reserved.</p>
  </footer>
</body>
</html>
