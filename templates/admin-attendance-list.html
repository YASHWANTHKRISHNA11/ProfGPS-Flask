<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Attendance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h2>Attendance Records</h2>
  <table border="1">
    <thead>
      <tr>
        <th>Faculty</th>
        <th>Date</th>
        <th>Time</th>
        <th>Latitude</th>
        <th>Longitude</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for record in attendance_list %}
      <tr>
        <td>{{ record.name }}</td>
        <td>{{ record.date }}</td>
        <td>{{ record.time }}</td>
        <td>{{ record.latitude }}</td>
        <td>{{ record.longitude }}</td>
        <td>
          <a href="{{ url_for('edit_attendance', attendance_id=record.id) }}">Edit</a> |
          <a href="{{ url_for('delete_attendance', attendance_id=record.id) }}" onclick="return confirm('Are you sure you want to delete this record?');">Delete</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
